<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Calculator India</title>
  <meta name="description" content="Calculate Body Mass Index (BMI) using height and weight, with category interpretation.">
  <meta name="keywords" content="bmi calculator india, india utility calculator, health and financial tools india">
  <meta property="og:title" content="BMI Calculator India">
  <meta property="og:description" content="Calculate Body Mass Index (BMI) using height and weight, with category interpretation.">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="styles.min.css">
  <script src="app.min.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-wrap">
      <a href="index.html" class="brand">India Utility Calculator</a>
      <nav class="site-nav" aria-label="Primary Navigation">
        <a href="index.html">Home</a>
        <a href="emi-calculator.html">EMI</a>
        <a href="gst-calculator.html">GST</a>
        <a href="sip-calculator.html">SIP</a>
        <a href="income-tax-calculator.html">Income Tax</a>
        <a href="blog/index.html">Blog</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="hero">
        <h1>BMI Calculator India</h1>
        <p>Check your Body Mass Index from height and weight with an easy category guide.</p>
      </section>

      <div class="ad-container">Ad Space</div>

      <section class="card">
        <h2>Calculate BMI</h2>
        <div class="field inline-row">
          <div>
            <label for="bmiWeight">Weight (kg)</label>
            <input id="bmiWeight" type="number" min="0" step="0.1" placeholder="Example: 68">
          </div>
          <div>
            <label for="bmiHeight">Height (cm)</label>
            <input id="bmiHeight" type="number" min="0" step="0.1" placeholder="Example: 170">
          </div>
        </div>

        <p id="bmiError" class="error-text" role="alert" aria-live="polite"></p>

        <div class="result-box">
          <div class="result-item"><span>BMI</span><span class="result-value" id="bmiValue">-</span></div>
          <div class="result-item"><span>Category</span><span class="result-value" id="bmiCategory" style="color:#1f7a4f;font-weight:700;">-</span></div>
        </div>

        <button id="copyBmiResultBtn" type="button" class="secondary copy-btn" style="margin-top: 1rem;">Copy Result</button>
      </section>

      <div class="ad-container">Ad Space</div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <small>© 2026 India Utility Calculator</small>
      <div class="footer-links">
        <a href="privacy-policy.html">Privacy Policy</a>
        <a href="terms.html">Terms</a>
      </div>
    </div>
  </footer>
</body>
</html>
